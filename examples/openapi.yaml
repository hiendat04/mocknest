openapi: 3.0.3
info:
  title: MockNest Sample API
  version: 1.0.0
  description: Sample API used to test MockNest end-to-end flow.
servers:
  - url: http://localhost:3001
paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
  /users:
    get:
      summary: List users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/{id}:
    get:
      summary: Get user by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /orders:
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /metrics:
    head:
      summary: Lightweight service metrics check
      responses:
        "204":
          description: No body on success
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        city:
          type: string
    CreateOrderRequest:
      type: object
      properties:
        userId:
          type: string
        amount:
          type: number
        currency:
          type: string
    Order:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        amount:
          type: number
        createdAt:
          type: string
